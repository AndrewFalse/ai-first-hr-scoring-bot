services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-screening-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: hr_screening
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../bot/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d hr_screening"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hr-screening-bot
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../data:/app/data

volumes:
  postgres_data:
